<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/assests/2.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroPulse Pro | High-Density ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-input { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.08); color: white; }
        .glass-input:focus { border-color: #10b981; outline: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        [x-cloak] { display: none !important; }
        
        input[type="checkbox"] {
            appearance: none; width: 16px; height: 16px;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
            cursor: pointer; position: relative; background: rgba(0,0,0,0.3);
        }
        input[type="checkbox"]:checked { background: #10b981; border-color: #10b981; }
        input[type="checkbox"]:checked::after {
            content: "✓"; position: absolute; color: white; font-size: 11px;
            top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold;
        }
    </style>
</head>
<body x-data="farmManager()" x-init="init()">

    <header class="px-6 py-4 max-w-[1600px] mx-auto flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div>
            <h1 class="text-xl font-black tracking-tighter text-white">Agroby<span class="text-emerald-500">Hassan</span></h1>
            <p class="text-slate-500 text-[9px] font-bold uppercase tracking-[0.2em]">By Hassan Bin Usman</p>
        </div>
        
        <div class="flex items-center gap-2 w-full sm:w-auto">
            <button @click="calcGrandTotal()" class="flex-1 sm:flex-none px-4 py-1.5 glass border-emerald-500/20 hover:bg-emerald-500/10 transition-all rounded-lg flex items-center gap-3">
                <span class="text-[9px] font-black uppercase tracking-widest text-emerald-500" x-text="grandTotal === 0 ? 'Calculate Grand Total' : 'Grand Total:'"></span>
                <span x-show="grandTotal !== 0" class="text-xs font-bold text-white">Rs <span x-text="format(grandTotal)"></span></span>
            </button>

            <button @click="deleteAll()" class="px-4 py-1.5 glass text-red-400 border-red-500/10 hover:bg-red-500/10 text-[9px] font-black uppercase tracking-widest rounded-lg transition-all">
                Clear Season
            </button>
        </div>
    </header>

    <main class="px-6 py-2 max-w-[1600px] mx-auto grid grid-cols-3 md:grid-cols-6 lg:grid-cols-8 xl:grid-cols-10 gap-2">
        <template x-for="id in acres" :key="id">
            <div @click="openAcre(id)" class="glass p-3 rounded-2xl cursor-pointer hover:border-emerald-500/40 transition-all group relative border-white/5">
                <div x-show="hasData(id)" class="absolute top-2 right-2 w-1.5 h-1.5 bg-emerald-400 rounded-full"></div>
                <h3 class="text-slate-500 group-hover:text-white font-bold text-[10px] uppercase" x-text="'Acre ' + id"></h3>
                <div class="mt-2">
                    <p x-show="!hasData(id)" class="text-[8px] text-slate-700 font-bold uppercase">Empty</p>
                    <div x-show="hasData(id)">
                        <p class="text-[8px] text-emerald-500 font-black uppercase leading-none">Net</p>
                        <p class="text-xs font-bold text-white truncate">Rs <span x-text="format(farmData[id].netProfit)"></span></p>
                    </div>
                </div>
            </div>
        </template>
    </main>

    <div x-show="modalOpen" class="fixed inset-0 z-50 flex items-center justify-center p-2 sm:p-4" x-cloak>
        <div @click="closeModal()" x-show="modalOpen" x-transition.opacity class="absolute inset-0 bg-slate-950/90 backdrop-blur-md"></div>
        
        <div x-show="modalOpen" x-transition.scale.95 class="relative w-full max-w-3xl h-full max-h-[92vh] glass rounded-[2rem] overflow-hidden flex flex-col shadow-2xl border-white/10">
            
            <div class="px-6 py-4 border-b border-white/5 flex justify-between items-center bg-white/[0.01]">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-emerald-500/10 flex items-center justify-center text-emerald-500"><i data-lucide="edit-3" class="w-4 h-4"></i></div>
                    <h2 class="text-sm font-black uppercase tracking-tight text-white">Acre <span x-text="activeAcreId" class="text-emerald-500"></span></h2>
                </div>
                <button @click="closeModal()" class="p-2 glass text-slate-500 hover:text-white rounded-lg transition-all"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>

            <div class="flex-1 overflow-y-auto px-6 py-4 space-y-2 custom-scrollbar" x-data="{ activeTab: 1 }">
                <div class="glass rounded-xl overflow-hidden border-white/5">
                    <button @click="activeTab = (activeTab === 1 ? 0 : 1)" class="w-full px-4 py-3 flex justify-between items-center hover:bg-white/5 transition-all">
                        <span class="text-[9px] font-black uppercase tracking-[0.15em] text-emerald-400">01. Sowing</span>
                        <i data-lucide="chevron-down" class="w-3 h-3" :class="activeTab === 1 ? 'rotate-180' : ''"></i>
                    </button>
                    <div x-show="activeTab === 1" x-collapse class="px-4 pb-4 grid grid-cols-2 gap-3">
                        <div><label class="text-[8px] font-bold text-slate-500 uppercase block mb-1">Crop</label><input type="text" x-model="editing.cropName" class="w-full glass-input px-3 py-2 rounded-lg text-xs"></div>
                        <div><label class="text-[8px] font-bold text-slate-500 uppercase block mb-1">Date</label><input type="date" x-model="editing.sowingDate" class="w-full glass-input px-3 py-2 rounded-lg text-xs"></div>
                    </div>
                </div>

                <div class="glass rounded-xl overflow-hidden border-white/5">
                    <button @click="activeTab = (activeTab === 2 ? 0 : 2)" class="w-full px-4 py-3 flex justify-between items-center hover:bg-white/5 transition-all">
                        <span class="text-[9px] font-black uppercase tracking-[0.15em] text-indigo-400">02. Land Prep</span>
                        <i data-lucide="chevron-down" class="w-3 h-3" :class="activeTab === 2 ? 'rotate-180' : ''"></i>
                    </button>
                    <div x-show="activeTab === 2" x-collapse class="px-4 pb-4 space-y-2">
                        <template x-for="(service, name) in editing.ploughing" :key="name">
                            <div class="flex items-center justify-between bg-black/20 px-3 py-2 rounded-lg border border-white/5">
                                <div class="flex items-center gap-3">
                                    <input type="checkbox" x-model="service.checked">
                                    <span class="text-[11px] font-bold" :class="service.checked ? 'text-white' : 'text-slate-500'" x-text="name"></span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-[8px] font-bold text-slate-600">Rs</span>
                                    <input type="number" x-model="service.cost" :disabled="!service.checked" class="w-20 bg-transparent border-b border-white/5 text-right text-xs font-bold disabled:opacity-10 focus:outline-none">
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <template x-for="section in sections" :key="section.key">
                    <div class="glass rounded-xl overflow-hidden border-white/5">
                        <button @click="activeTab = (activeTab === section.tab ? 0 : section.tab)" class="w-full px-4 py-3 flex justify-between items-center hover:bg-white/5">
                            <span class="text-[9px] font-black uppercase tracking-[0.15em]" :class="section.color" x-text="section.label"></span>
                            <i data-lucide="chevron-down" class="w-3 h-3" :class="activeTab === section.tab ? 'rotate-180' : ''"></i>
                        </button>
                        <div x-show="activeTab === section.tab" x-collapse class="px-4 pb-4 space-y-2">
                            <template x-for="(item, index) in editing[section.key]" :key="index">
                                <div class="grid grid-cols-12 gap-2 items-center bg-black/20 p-2 rounded-lg border border-white/5">
                                    <div class="col-span-5"><input type="text" x-model="item.name" placeholder="Item..." class="w-full bg-transparent text-[11px] font-bold outline-none"></div>
                                    <div class="col-span-4"><input type="date" x-model="item.date" class="w-full bg-transparent text-[9px] text-slate-500"></div>
                                    <div class="col-span-2 text-right"><input type="number" x-model="item.cost" placeholder="0" class="w-full bg-transparent text-right text-[11px] font-bold"></div>
                                    <div class="col-span-1 text-right">
                                        <button @click="removeRow(section.key, index)" class="text-red-500/20 hover:text-red-500"><i data-lucide="minus-circle" class="w-3 h-3"></i></button>
                                    </div>
                                </div>
                            </template>
                            <button @click="addRow(section.key)" class="w-full py-2 border border-dashed border-white/5 rounded-lg text-[8px] font-black uppercase text-slate-500 hover:text-white mt-1">+ Add Entry</button>
                        </div>
                    </div>
                </template>

                <div class="glass rounded-xl overflow-hidden border-white/5">
                    <button @click="activeTab = (activeTab === 6 ? 0 : 6)" class="w-full px-4 py-3 flex justify-between items-center hover:bg-white/5">
                        <span class="text-[9px] font-black uppercase tracking-[0.15em] text-white">06. Result</span>
                        <i data-lucide="chevron-down" class="w-3 h-3" :class="activeTab === 6 ? 'rotate-180' : ''"></i>
                    </button>
                    <div x-show="activeTab === 6" x-collapse class="px-4 pb-4">
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div><label class="text-[8px] font-bold text-slate-500 uppercase block mb-1">Maunds</label><input type="number" x-model="editing.yieldQty" class="w-full glass-input px-3 py-2 rounded-lg text-xs text-center font-bold"></div>
                            <div><label class="text-[8px] font-bold text-slate-500 uppercase block mb-1">Rate</label><input type="number" x-model="editing.yieldRate" class="w-full glass-input px-3 py-2 rounded-lg text-xs text-center font-bold"></div>
                        </div>
                        <div class="py-4 glass rounded-xl text-center border-emerald-500/10 bg-emerald-500/5">
                            <p class="text-[8px] font-black uppercase tracking-[0.2em] mb-1 opacity-50">Profit</p>
                            <h2 class="text-2xl font-black" :class="calcNet() >= 0 ? 'text-emerald-400' : 'text-red-400'">Rs <span x-text="format(calcNet())"></span></h2>
                        </div>
                    </div>
                </div>
            </div>

            <div class="px-6 py-4 border-t border-white/5 bg-white/[0.01] flex gap-2">
                <button @click="deleteAcre()" class="px-4 py-3 glass text-red-500 border-red-500/5 hover:bg-red-500/5 font-black uppercase text-[9px] tracking-widest rounded-xl transition-all">Reset</button>
                <button @click="saveAcre()" class="flex-1 py-3 bg-emerald-500 hover:bg-emerald-600 text-white font-black uppercase text-[9px] tracking-[0.2em] rounded-xl shadow-lg shadow-emerald-500/10">Save</button>
            </div>
        </div>
    </div>

    <script>
        function farmManager() {
            return {
                modalOpen: false, activeAcreId: null, grandTotal: 0,
                acres: [...Array(48).keys()].map(i => i + 1).concat(['48.5']),
                farmData: {}, editing: {},
                sections: [
                    { label: '03. Seeds', key: 'seeds', tab: 3, color: 'text-amber-500' },
                    { label: '04. Fertilizers', key: 'fertilizers', tab: 4, color: 'text-purple-400' },
                    { label: '05. Pesticides', key: 'pesticides', tab: 5, color: 'text-orange-400' }
                ],
                init() {
                    const saved = localStorage.getItem('agro_pulse_v9_total');
                    if (saved) this.farmData = JSON.parse(saved);
                    setTimeout(() => lucide.createIcons(), 100);
                },
                getNewAcre() {
                    return {
                        cropName: '', sowingDate: '',
                        ploughing: { 'Rotavator': {checked:false, cost:0}, 'Raja Plough': {checked:false, cost:0}, 'Disc Plough': {checked:false, cost:0}, 'Laser Leveler': {checked:false, cost:0}, 'Chisel Plough': {checked:false, cost:0} },
                        seeds: [{name: '', date: '', cost: 0}],
                        fertilizers: [{name: '', date: '', cost: 0}],
                        pesticides: [{name: '', date: '', cost: 0}],
                        yieldQty: 0, yieldRate: 0, netProfit: 0, hasData: false
                    };
                },
                openAcre(id) {
                    this.activeAcreId = id;
                    this.editing = this.farmData[id] ? JSON.parse(JSON.stringify(this.farmData[id])) : this.getNewAcre();
                    this.modalOpen = true;
                    setTimeout(() => lucide.createIcons(), 50);
                },
                addRow(key) { this.editing[key].push({name: '', date: '', cost: 0}); },
                removeRow(key, index) { this.editing[key].splice(index, 1); },
                calcNet() {
                    const pTotal = Object.values(this.editing.ploughing || {}).reduce((acc, i) => i.checked ? acc + Number(i.cost || 0) : acc, 0);
                    const sum = (arr) => arr.reduce((a, b) => a + Number(b.cost || 0), 0);
                    const expenses = pTotal + sum(this.editing.seeds) + sum(this.editing.fertilizers) + sum(this.editing.pesticides);
                    return (Number(this.editing.yieldQty || 0) * Number(this.editing.yieldRate || 0)) - expenses;
                },
                saveAcre() {
                    this.editing.netProfit = this.calcNet();
                    this.editing.hasData = true;
                    this.farmData[this.activeAcreId] = JSON.parse(JSON.stringify(this.editing));
                    localStorage.setItem('agro_pulse_v9_total', JSON.stringify(this.farmData));
                    this.modalOpen = false;
                    this.grandTotal = 0; // Reset total to force user to recalculate
                },
                calcGrandTotal() {
                    this.grandTotal = Object.values(this.farmData).reduce((acc, acre) => acc + (acre.netProfit || 0), 0);
                },
                deleteAcre() {
                    if (confirm(`Clear Acre ${this.activeAcreId}?`)) {
                        delete this.farmData[this.activeAcreId];
                        localStorage.setItem('agro_pulse_v9_total', JSON.stringify(this.farmData));
                        this.modalOpen = false;
                        this.grandTotal = 0;
                    }
                },
                deleteAll() { if(confirm("Clear All?")) { this.farmData = {}; localStorage.setItem('agro_pulse_v9_total', '{}'); this.grandTotal = 0; } },
                hasData(id) { return this.farmData[id] && this.farmData[id].hasData; },
                closeModal() { this.modalOpen = false; },
                format(num) { return Number(num || 0).toLocaleString(); }
            }
        }
    </script>
</body>
</html>
